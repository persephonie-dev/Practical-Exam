<!DOCTYPE html>
<html lang="en">

<head>
	<title><strong>Pizza by the Slice</strong></title><br>
	<link rel="stylesheet" href="style.css">
</head>

<body>

	<h1><b>Personal Details</b></h1><br>

		<form action = "">

		<label for="fname">First Name:</label>
		<input type="text" id="fname" name="fname" required minlength="5" maxlength="60">

		<label for="mname">Middle Name:</label>
		<input type="text" id="mname" name="mname" required minlength="5" maxlength="60">

		<label for="lname">Last Name:</label>
		<input type="text" id="lname" name="lname" required minlength="5" maxlength="60">

		<label for="email">Email:</label>
		<input type="email" id="email" name="email" required>

		<label for="age">Age:</label>
		<input type="number" id="age" name="age" required min="13" max="99">

	<h2><b>Pizza Size</b></h2>

		<input type="radio" id="small" name="size" value="small">
		<input type="radio" id="medium" name="size" value="medium">
		<input type="radio" id="large" name="size"value="large">
		<input type="radio" id="extra large" name="size" value="extra large">

</form>
</body>
</html>
